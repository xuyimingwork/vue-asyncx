name: Publish to npm

on:
  workflow_dispatch:

# Trusted Publisher (OIDC) 需要此权限生成短期 token
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get latest v tag from main
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 main 2>/dev/null || git tag -l 'v*' --merged main | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ] || [[ ! "$LATEST_TAG" =~ ^v ]]; then
            echo "No valid v tag found on main branch"
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag on main: $LATEST_TAG"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # Trusted Publisher 要求 npm CLI 11.5.1+
      - name: Setup npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: |
          pnpm add -D playwright
          pnpm exec playwright install --with-deps chromium

      - name: Run test:all
        run: pnpm test:all

      - name: Verify version and determine npm tag
        id: version
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          TAG="${LATEST_TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"
          # 预发布版本使用对应 dist-tag，避免污染 latest
          if [[ "$PKG_VERSION" =~ -(alpha|beta|rc)(\.[0-9]+)?$ ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
          else
            NPM_TAG="latest"
          fi
          echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
          echo "Publishing to npm dist-tag: $NPM_TAG"

      # prepublish 会执行 test:all（含 build），通过后才 publish
      # --provenance: 生成供应链溯源证明，Trusted Publisher 推荐显式指定
      # --tag: 预发布版本打 beta/alpha/rc，正式版打 latest（默认）
      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.npm_tag }}
